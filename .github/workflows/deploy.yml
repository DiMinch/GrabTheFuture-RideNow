# Trigger deploy to Cloud Run
name: Deploy AI Gateway to Cloud Run

on:
  push:
    branches:
      - main
      - dev(ai)-minh
    paths:
      - 'ai-gateway/**'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: ai-gateway

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for GCP
      run: |
        gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

    - name: Build and Push Docker Image
      run: |
        # Đảm bảo bạn đã tạo Artifact Registry Repository tên là 'ride-now' ở Singapore trước
        IMAGE_TAG="asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/ride-now/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        docker build -t $IMAGE_TAG ./ai-gateway
        docker push $IMAGE_TAG
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE_NAME }}
        region: ${{ env.REGION }}
        image: asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/ride-now/${{ env.SERVICE_NAME }}:${{ github.sha }}
        flags: |
          --allow-unauthenticated
          --port=8000
        env_vars: |
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEOVINA_API_KEY=${{ secrets.GEOVINA_API_KEY }}
          BACKEND_SERVER_URL=${{ secrets.BACKEND_SERVER_URL }}
