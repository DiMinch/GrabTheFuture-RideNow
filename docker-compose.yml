version: '3.8'

services:
  ai-gateway:
    build:
      context: ./ai-gateway
      dockerfile: Dockerfile
    container_name: ai_gateway
    ports:
      - "8000:8000"
    env_file:
      - ./ai-gateway/.env
    environment:
      - PORT=8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_SERVER_URL=http://backend-server:5000
    depends_on:
      - redis
    volumes:
      - ./ai-gateway:/app
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: always
